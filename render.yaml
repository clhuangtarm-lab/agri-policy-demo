services:
  - type: web
    name: agri-policy-demo-interactive
    runtime: python
    branch: interactive-traceability-v03
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/demo.db
